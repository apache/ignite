<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Ignite page replacement and persistence I/O</title>
  <desc id="desc">A diagram showing hot pages in memory, cold pages on disk, page reads, clean eviction, dirty page checkpoints, and WAL writes.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L13,5 L0,10 Z" fill="#ff6716"/>
    </marker>
    <style>
      .title{font:700 34px Helvetica,Arial,sans-serif;fill:#3c3c3b}
      .label{font:700 23px Helvetica,Arial,sans-serif;fill:#fff}
      .small{font:700 17px Helvetica,Arial,sans-serif;fill:#fff}
      .note{font:700 18px Helvetica,Arial,sans-serif;fill:#3c3c3b}
      .disk{fill:#72afd0;stroke:#4f8fb2;stroke-width:2}
      .mem{fill:#ff6b6b;stroke:#e55353;stroke-width:2}
      .gray{fill:#7f7f7f;stroke:#666;stroke-width:2}
      .soft{fill:#eeeded;stroke:#d4d4d4;stroke-width:2}
      .arrow{stroke:#ff6716;stroke-width:6;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="640" y="56" text-anchor="middle" class="title">Page replacement turns memory shortage into disk I/O</text>

  <rect x="98" y="118" width="420" height="360" rx="20" class="mem" filter="url(#shadow)"/>
  <text x="308" y="163" text-anchor="middle" class="label">Data region in RAM</text>
  <rect x="138" y="205" width="92" height="70" rx="10" fill="#ff8a8a" stroke="#e55353" stroke-width="2"/>
  <text x="184" y="247" text-anchor="middle" class="small">hot</text>
  <rect x="260" y="205" width="92" height="70" rx="10" fill="#ff8a8a" stroke="#e55353" stroke-width="2"/>
  <text x="306" y="247" text-anchor="middle" class="small">hot</text>
  <rect x="382" y="205" width="92" height="70" rx="10" fill="#ff8a8a" stroke="#e55353" stroke-width="2"/>
  <text x="428" y="247" text-anchor="middle" class="small">dirty</text>
  <rect x="138" y="315" width="92" height="70" rx="10" fill="#ff8a8a" stroke="#e55353" stroke-width="2"/>
  <text x="184" y="357" text-anchor="middle" class="small">index</text>
  <rect x="260" y="315" width="92" height="70" rx="10" fill="#ff8a8a" stroke="#e55353" stroke-width="2"/>
  <text x="306" y="357" text-anchor="middle" class="small">free</text>
  <rect x="382" y="315" width="92" height="70" rx="10" fill="#ff8a8a" stroke="#e55353" stroke-width="2"/>
  <text x="428" y="347" text-anchor="middle" class="small">evict</text>
  <text x="428" y="369" text-anchor="middle" class="small">candidate</text>

  <rect x="750" y="110" width="370" height="100" rx="18" class="disk" filter="url(#shadow)"/>
  <text x="935" y="151" text-anchor="middle" class="label">Partition files</text>
  <text x="935" y="181" text-anchor="middle" class="small">cold pages and checkpointed pages</text>
  <rect x="750" y="292" width="370" height="88" rx="18" class="disk" filter="url(#shadow)"/>
  <text x="935" y="347" text-anchor="middle" class="label">Active WAL</text>
  <rect x="750" y="450" width="370" height="88" rx="18" class="disk" filter="url(#shadow)"/>
  <text x="935" y="505" text-anchor="middle" class="label">Checkpoint writes</text>

  <rect x="98" y="542" width="1022" height="58" rx="14" class="soft"/>
  <text x="609" y="578" text-anchor="middle" class="note">A small data region can save RAM, but page misses, checkpoints, and WAL writes must fit disk latency and IOPS.</text>

  <path d="M750 158 H548" class="arrow"/>
  <path d="M518 352 H725 Q750 352 750 180" class="arrow"/>
  <path d="M428 205 V145 H725" class="arrow"/>
  <path d="M474 240 H728 Q750 240 750 326" class="arrow"/>
  <path d="M474 350 H700 Q730 350 750 494" class="arrow"/>

  <text x="630" y="136" text-anchor="middle" class="note">page miss read</text>
  <text x="628" y="328" text-anchor="middle" class="note">clean eviction</text>
  <text x="632" y="235" text-anchor="middle" class="note">update WAL</text>
  <text x="620" y="480" text-anchor="middle" class="note">dirty page checkpoint</text>
</svg>
