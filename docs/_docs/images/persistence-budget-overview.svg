<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Ignite persistence storage budget overview</title>
  <desc id="desc">A storage budget diagram showing memory, partition files, WAL, WAL archive, snapshots, operating system page cache, and logs.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <marker id="arrow" markerWidth="13" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L13,5 L0,10 Z" fill="#ff6716"/>
    </marker>
    <style>
      .title{font:700 34px Helvetica,Arial,sans-serif;fill:#3c3c3b}
      .label{font:700 23px Helvetica,Arial,sans-serif;fill:#fff}
      .small{font:700 18px Helvetica,Arial,sans-serif;fill:#fff}
      .note{font:700 19px Helvetica,Arial,sans-serif;fill:#3c3c3b}
      .disk{fill:#72afd0;stroke:#4f8fb2;stroke-width:2}
      .mem{fill:#ff6b6b;stroke:#e55353;stroke-width:2}
      .gray{fill:#7f7f7f;stroke:#666;stroke-width:2}
      .soft{fill:#eeeded;stroke:#d4d4d4;stroke-width:2}
      .arrow{stroke:#ff6716;stroke-width:6;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="640" y="58" text-anchor="middle" class="title">Persistence storage budget of one Ignite node</text>

  <rect x="58" y="105" width="270" height="470" rx="18" class="soft" filter="url(#shadow)"/>
  <rect x="88" y="145" width="210" height="70" rx="12" class="gray"/>
  <text x="193" y="188" text-anchor="middle" class="label">Updates</text>
  <rect x="88" y="245" width="210" height="70" rx="12" class="gray"/>
  <text x="193" y="288" text-anchor="middle" class="label">Reads</text>
  <rect x="88" y="345" width="210" height="70" rx="12" class="gray"/>
  <text x="193" y="388" text-anchor="middle" class="label">SQL</text>
  <text x="193" y="535" text-anchor="middle" class="note">Workload shape</text>

  <rect x="430" y="126" width="270" height="126" rx="18" class="mem" filter="url(#shadow)"/>
  <text x="565" y="178" text-anchor="middle" class="label">Data region</text>
  <text x="565" y="210" text-anchor="middle" class="small">hot pages in RAM</text>
  <rect x="430" y="292" width="270" height="92" rx="18" class="mem" filter="url(#shadow)"/>
  <text x="565" y="347" text-anchor="middle" class="label">Checkpoint buffer</text>
  <rect x="430" y="424" width="270" height="92" rx="18" class="disk" filter="url(#shadow)"/>
  <text x="565" y="462" text-anchor="middle" class="label">OS page cache</text>
  <text x="565" y="493" text-anchor="middle" class="small">host RAM reserve</text>

  <rect x="820" y="100" width="330" height="82" rx="16" class="disk" filter="url(#shadow)"/>
  <text x="985" y="150" text-anchor="middle" class="label">Partition files</text>
  <rect x="820" y="220" width="330" height="82" rx="16" class="disk" filter="url(#shadow)"/>
  <text x="985" y="270" text-anchor="middle" class="label">Active WAL</text>
  <rect x="820" y="340" width="330" height="82" rx="16" class="disk" filter="url(#shadow)"/>
  <text x="985" y="390" text-anchor="middle" class="label">WAL archive</text>
  <rect x="820" y="460" width="330" height="82" rx="16" class="disk" filter="url(#shadow)"/>
  <text x="985" y="510" text-anchor="middle" class="label">Snapshots / backups</text>
  <rect x="820" y="580" width="330" height="62" rx="16" class="gray" filter="url(#shadow)"/>
  <text x="985" y="619" text-anchor="middle" class="label">Logs / diagnostics</text>

  <path d="M298 180 H410" class="arrow"/>
  <path d="M298 280 H410" class="arrow"/>
  <path d="M700 190 H805" class="arrow"/>
  <path d="M700 338 H805 V261 H805" class="arrow"/>
  <path d="M700 470 H805" class="arrow"/>
  <path d="M985 302 V327" class="arrow"/>
  <path d="M985 422 V447" class="arrow"/>

  <rect x="72" y="610" width="606" height="48" rx="12" class="soft"/>
  <text x="375" y="641" text-anchor="middle" class="note">Storage cost = data files + WAL + archives + snapshots + operational headroom</text>
</svg>
